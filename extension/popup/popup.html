<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Insta Enhancer</title>
    <style>
      :root {
        --bg: #12100d;
        --panel: #1b1713;
        --panel-2: #241d16;
        --border: #5b4b3a;
        --text: #f1e1c4;
        --muted: #c2a982;
        --accent: #d49b62;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 296px;
        padding: 14px;
        border: 1px solid var(--border);
        background:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.016) 1px, transparent 1px),
          linear-gradient(180deg, #14110d, #100d0a);
        background-size: 28px 28px, 28px 28px, auto;
        color: var(--text);
        font-family: "IBM Plex Sans", "Trebuchet MS", "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 15px;
        letter-spacing: 0.02em;
        font-family: "IBM Plex Mono", Consolas, "Courier New", monospace;
      }

      p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .panel {
        border: 1px solid var(--border);
        background: var(--panel);
        padding: 10px;
        margin-bottom: 10px;
      }

      .meta {
        display: grid;
        gap: 5px;
        font-size: 12px;
      }

      .meta b {
        color: var(--text);
        font-weight: 600;
      }

      .meta span {
        color: var(--muted);
      }

      button {
        width: 100%;
        border: 1px solid #8e6f4d;
        background: linear-gradient(180deg, #7f5b3a, #66472d);
        color: #fff5e5;
        padding: 9px 10px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        cursor: pointer;
      }

      button:hover {
        background: linear-gradient(180deg, #906643, #715033);
      }

      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      #status {
        min-height: 16px;
        margin-top: 8px;
        font-size: 11px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <h1>Retro Dark Theme</h1>
    <p>Single-theme mode is enabled. This extension now always uses the retro dark style.</p>

    <div class="panel" aria-label="Theme summary">
      <div class="meta"><b>Theme:</b> <span>Retro Dark Beige</span></div>
      <div class="meta"><b>Corners:</b> <span>Sharp</span></div>
      <div class="meta"><b>Contrast:</b> <span>High</span></div>
    </div>

    <button id="applyBtn" type="button">Reapply To Current DM Tab</button>
    <div id="status" aria-live="polite"></div>

    <script src="popup.js"></script>
  </body>
</html>
